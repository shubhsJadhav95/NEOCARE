name: Kubernetes CD

on:
  push:
    branches:
      - devops
    paths:
      - "k8s/**"

jobs:
  deploy_to_k8s:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: devops
          fetch-depth: 0

      - name: Update backend image
        run: |
          sed -i 's|image: .*|image: 347026173735.dkr.ecr.us-east-1.amazonaws.com/neocare-backend:latest|g' k8s/backend/deployment.yml

          if ! grep -q "imagePullPolicy" k8s/backend/deployment.yml; then
            sed -i '/image:/a\        imagePullPolicy: Always' k8s/backend/deployment.yml
          fi

      - name: Update frontend image
        run: |
          sed -i 's|image: .*|image: 347026173735.dkr.ecr.us-east-1.amazonaws.com/neocare-frontend:latest|g' k8s/frontend/deployment.yml

          if ! grep -q "imagePullPolicy" k8s/frontend/deployment.yml; then
            sed -i '/image:/a\        imagePullPolicy: Always' k8s/frontend/deployment.yml
          fi

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/backend/deployment.yml -n neocare
          kubectl apply -f k8s/frontend/deployment.yml -n neocare

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/backend -n neocare
          kubectl rollout restart deployment/frontend -n neocare

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n neocare --timeout=180s
          kubectl rollout status deployment/frontend -n neocare --timeout=180s

      - name: Commit manifest changes
        run: |
          git config user.name github-actions
          git config user.email actions@github.com

          git add k8s/backend/deployment.yml
          git add k8s/frontend/deployment.yml

          if ! git diff --cached --quiet; then
            git commit -m "Update Kubernetes manifests [skip ci]"
            git push origin devops
          fi