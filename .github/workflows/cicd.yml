name: React Frontend CICD Pipeline

on:
  push:
    branches: [ "devops" ]

jobs:
  install_and_build:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # ✅ Delete old node_modules first
    - name: Clean Old Dependencies
      run: rm -rf node_modules dist

    # ✅ Clean install instead of regular install
    - name: Install Dependencies
      run: npm ci
      working-directory: ./frontend    # ← add this

    - name: Build Vite App
      run: npm run build
      working-directory: ./frontend    # ← add this

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vite-build
        path: dist/
        retention-days: 1

  security-check:
    runs-on: self-hosted
    needs: install_and_build

    steps:
    - uses: actions/checkout@v4

    - name: Trivy Installation
      run: |
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y

            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

            echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list

            sudo apt-get update
            sudo apt-get install trivy -y

    
    - name: Trivy FS Scan
      run: trivy fs --format table -o fs-report.txt .

    - name: Upload Trivy Report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-report
        path: fs-report.txt

  test:
      runs-on: self-hosted
      needs: security-check

      steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run Unit Tests
        run: npm test -- --watchAll=false --passWithNoTests
        working-directory: ./frontend
      