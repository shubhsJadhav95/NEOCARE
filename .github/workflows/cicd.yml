name: React Frontend CICD Pipeline

on:
  push:
    branches: [ "devops" ]

jobs:
  install_and_build:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # ✅ Delete old node_modules first
    - name: Clean Old Dependencies
      run: rm -rf node_modules dist

    # ✅ Clean install instead of regular install
    - name: Install Dependencies
      run: npm ci
      working-directory: ./frontend    # ← add this

    - name: Build Vite App
      run: npm run build
      working-directory: ./frontend    # ← add this

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vite-build
        path: dist/
        retention-days: 1

  security-check:
    runs-on: self-hosted
    needs: install_and_build

    steps:
    - uses: actions/checkout@v4

    - name: Trivy Installation
      run: |
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -y
        sudo apt-get install -y trivy

    
    - name: Trivy FS Scan
      run: trivy fs --format table -o fs-report.txt .

    - name: Upload Trivy Report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-report
        path: fs-report.txt

    - name: Gitleaks Installation
      run: sudo apt install gitleaks -y

    