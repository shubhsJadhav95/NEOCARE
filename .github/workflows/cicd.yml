name: React Frontend CICD Pipeline

on:
  push:
    branches: [ "devops" ]

jobs:
  install_and_build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install Dependencies
      run: npm install
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: react-build
        path: build/
        retention-days: 1

    - name: Build React App
      run: npm run build

    