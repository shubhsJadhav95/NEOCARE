name: React Frontend CICD Pipeline

on:
  push:
    branches: [ "devops" ]

jobs:
  install_and_build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # ✅ Delete old node_modules first
    - name: Clean Old Dependencies
      run: rm -rf node_modules dist

    # ✅ Clean install instead of regular install
    - name: Install Dependencies
      run: npm ci
      working-directory: ./frontend    # ← add this

    - name: Build Vite App
      run: npm run build
      working-directory: ./frontend    # ← add this

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vite-build
        path: dist/
        retention-days: 1

    