apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: neocare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: shubhsjadhav95/neocare-backend:v12

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: backend-config

            - secretRef:
                name: backend-secret