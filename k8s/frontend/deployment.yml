apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: neocare
spec:
  replicas: 12
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: neocare-frontend-deploy
        image: 
        ports:
        - containerPort: 8080
# image via pipeline